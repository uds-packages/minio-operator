name: Retag Minio Images

on:
  schedule:
    - cron: '0 14 * * *' # daily at 8 AM Central
  workflow_dispatch: # manual trigger for testing

jobs:
  retag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - source: cgr.dev/chainguard/minio-client:latest
            destination: ghcr.io/uds-packages/chainguard-minio-client
          - source: cgr.dev/chainguard/minio:latest
            destination: ghcr.io/uds-packages/chainguard-minio

    steps:
      - name: Install UDS CLI
        uses: defenseunicorns/setup-uds@ab842abcad1f7a3305c2538e3dd1950d0daacfa5 # v1.0.1
        with:
          # renovate: datasource=github-tags depName=defenseunicorns/uds-cli versioning=semver
          version: v0.30.0

      - name: GHCR Login
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${{ env.GH_TOKEN }}" | uds zarf tools registry login -u "dummy" --password-stdin ghcr.io
        shell: bash

      - name: Get latest release tag from chainguard-forks/minio
        id: fork_release
        run: |
          FORK_TAG=$(gh release view --repo chainguard-forks/minio --json tagName -q '.tagName')
          echo "Latest fork release tag: ${FORK_TAG}"
          echo "fork_tag=${FORK_TAG}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag from destination image
        id: uds_package_image_tag
        run: |
          DESTINATION="${{ matrix.image.destination }}"
          UDS_PACKAGE_IMAGE_TAG=$(uds zarf tools registry ls ${DESTINATION} 2>/dev/null | sort | tail -n 1 || echo "none")
          echo "Latest destination tag: ${UDS_PACKAGE_IMAGE_TAG}"
          echo "uds_package_image_tag=${UDS_PACKAGE_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Check digest and retag if needed
        run: |
          SOURCE="${{ matrix.image.source }}"
          DESTINATION="${{ matrix.image.destination }}"
          FORK_TAG="${{ steps.fork_release.outputs.fork_tag }}"
          UDS_PACKAGE_IMAGE_TAG="${{ steps.uds_package_image_tag.outputs.uds_package_image_tag }}"

          if [ "${FORK_TAG}" = "${UDS_PACKAGE_IMAGE_TAG}" ]; then
            SOURCE_DIGEST=$(uds zarf tools registry digest ${SOURCE})
            echo "Source digest: ${SOURCE_DIGEST}"

            DESTINATION_DIGEST=$(uds zarf tools registry digest ${DESTINATION}:${UDS_PACKAGE_IMAGE_TAG})
            echo "Destination digest: ${DESTINATION_DIGEST}"

            if [ "${SOURCE_DIGEST}" = "${DESTINATION_DIGEST}" ]; then
              echo "Tag ${FORK_TAG} exists with matching digest, no change needed"
            else
              echo "Tag ${FORK_TAG} exists but digest differs, manual intervention required"
              exit 1
            fi
          else
            echo "New fork release ${FORK_TAG} detected, copying image"
            uds zarf tools registry copy ${SOURCE} ${DESTINATION}:${FORK_TAG}
            echo "Pushed ${DESTINATION}:${FORK_TAG}"
          fi