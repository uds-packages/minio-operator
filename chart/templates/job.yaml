{{- range .Values.apps }}
{{- $secretName := (printf "minio-%s" .name) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .name }}-minio-setup-{{ $.Release.Revision }}
  namespace: minio
  labels:
    app.kubernetes.io/component: minio-setup
spec:
  template:
    spec:
      containers:
      - name: minio-setup
        image: {{ $.Values.mcImage }}
        command: [{{ $.Values.mcShell | quote }}, "-c"]
        args:
          - |
            # The config chart can be installed before the tenant service is ready.
            # Retry in this container so Kubernetes does not exhaust the Job backoff.
            attempt=1
            until mc alias set myminio "$MINIO_SERVER" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"; do
              if [ "$attempt" -ge 120 ]; then
                echo "MinIO was not reachable after 10 minutes" >&2
                exit 1
              fi
              attempt=$((attempt + 1))
              sleep 5
            done

            {{- range $bucket := .bucketNames }}
            mc mb --ignore-existing myminio/{{ $bucket }};
            {{- end }}

            mc admin policy create myminio {{ .name }}-policy /config/policy.json;
            mc admin user add myminio $USER $USER_SECRET;
            mc admin policy attach myminio {{ .name }}-policy --user $USER || echo Skipping user attachment;
        env:
        - name: MINIO_SERVER
          value: "http://uds-minio-hl.minio.svc.cluster.local:9000"
        - name: MC_CONFIG_DIR
          value: "/tmp/mc/"
        - name: USER
          valueFrom:
            secretKeyRef:
              name: {{ $secretName }}
              key: "accessKey"
        - name: USER_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ $secretName }}
              key: "secretKey"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name:  {{ $.Values.name }}-creds
              key: rootUser
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name:  {{ $.Values.name }}-creds
              key: rootPassword
        volumeMounts:
        - name: policy-config
          mountPath: /config
        - name: config-volume
          mountPath: /tmp
      restartPolicy: OnFailure
      volumes:
        - name: policy-config
          configMap:
            name: {{ .name }}-minio-policy
        - name: config-volume
          emptyDir: {}
      restartPolicy: OnFailure
  backoffLimit: 4
---
{{- end }}
