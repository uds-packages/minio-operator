apiVersion: batch/v1
kind: Job
metadata:
  name: minio-policy-job
  namespace: mc-cli
spec:
  template:
    spec:
      containers:
        - name: minio-client
          image: ghcr.io/uds-packages/minio-operator/container/chainguard/minio-client:0.20250813.083541-r17
          command: ["/bin/bash", "-c"]
          args:
            - |
              BN="mc-cli-policy-bucket"
              attempt=1
              until mc alias set myminio "$MINIO_SERVER" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"; do
                if [ "$attempt" -ge 60 ]; then
                  echo "MinIO was not reachable after five minutes" >&2
                  exit 1
                fi
                attempt=$((attempt + 1))
                sleep 5
              done
              echo "Hello from Kubernetes Job!" > /tmp/hello.txt
              if mc cp /tmp/hello.txt "myminio/$BN/hello.txt"; then
                echo "Bucket upload should be disallowed but succeeded instead"
                exit 1
              fi
              mc ls "myminio/$BN"
              echo "Bucket upload failed successfully and list completed successfully"
          env:
            - name: MINIO_SERVER
              value: "http://uds-minio-hl.minio.svc.cluster.local:9000"
            - name: MC_CONFIG_DIR
              value: "/tmp/mc/"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-mc-cli-policy
                  key: accessKey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-mc-cli-policy
                  key: secretKey
          volumeMounts:
            - name: config-volume
              mountPath: /tmp
      restartPolicy: Never
      volumes:
        - name: config-volume
          emptyDir: {}
  # Connectivity retries happen in the container so a transient startup race
  # does not leave failed pods behind.
  backoffLimit: 0
