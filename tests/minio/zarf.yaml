# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: minio-test
  description: "A test that minio can be connected to and is functional"
  version: 0.1.0

variables:
  - name: ISTIO_MODE
    description: "The Istio mode to use for the test"
    default: ambient


components:
  # Reconcile the UDS Package before creating pods. In sidecar mode the namespace
  # must be labeled for injection before the Jobs are admitted.
  - name: configure-mc-cli-network
    required: true
    manifests:
      - name: mc-cli-package
        namespace: mc-cli
        files:
          - uds-package.yaml
    actions:
      onDeploy:
        after:
          - description: Wait for the mc-cli UDS Package
            maxTotalSeconds: 300
            wait:
              cluster:
                kind: Packages
                name: mc-cli
                namespace: mc-cli
                condition: "'{.status.phase}'=Ready"

  - name: test-minio-connectivity
    required: true
    manifests:
      - name: mc-cli-jobs
        namespace: mc-cli
        files:
          - mc-cli-test.yaml
          - mc-cli-policy.yaml
    images:
      - ghcr.io/uds-packages/minio-operator/container/chainguard/minio-client:0.20250813.083541-r16
