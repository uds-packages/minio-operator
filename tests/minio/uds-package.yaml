apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: mc-cli
  namespace: mc-cli
spec:
  network:
    serviceMesh:
      mode: ###ZARF_VAR_ISTIO_MODE###
    allow:
      - direction: Egress
        selector:
          job-name: minio-policy-job
        remoteNamespace: minio
        remoteSelector:
          v1.min.io/tenant: uds-minio
        description: "Egress from minio policy job to MinIO"
      - direction: Egress
        selector:
          job-name: minio-test-job
        remoteNamespace: minio
        remoteSelector:
          v1.min.io/tenant: uds-minio
        description: "Egress from minio test job to MinIO"

